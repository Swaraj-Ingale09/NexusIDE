version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME:-nexuside_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Remove host port mapping - use Docker internal networking only
    # expose:
    #   - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    # Remove host port mapping - use Docker internal networking only
    # expose:
    #   - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/nexuside_locations.conf:/etc/nginx/conf.d/nexuside_locations.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
      - ./static/dist:/app/static/dist:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health/"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: .
    command: gunicorn config.wsgi:application -c gunicorn_config.py
    volumes:
      - .:/app
      # SECURITY: Docker socket removed - use Docker SDK or socket proxy instead
      # - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=False
      - DB_NAME=${DB_NAME:-nexuside_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - DOCKER_ENABLED=True
      - GUNICORN_WORKERS=2
      - GUNICORN_THREADS=4
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Sandbox images for secure code execution
  sandbox-python:
    build:
      context: ./apps/compiler/dockerfiles
      dockerfile: Dockerfile.python
    image: nexuside-python:latest
    command: echo "Sandbox image built successfully"

  sandbox-c:
    build:
      context: ./apps/compiler/dockerfiles
      dockerfile: Dockerfile.c
    image: nexuside-c:latest
    command: echo "Sandbox image built successfully"

  sandbox-cpp:
    build:
      context: ./apps/compiler/dockerfiles
      dockerfile: Dockerfile.cpp
    image: nexuside-cpp:latest
    command: echo "Sandbox image built successfully"

volumes:
  postgres_data:
