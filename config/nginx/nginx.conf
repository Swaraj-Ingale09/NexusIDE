# ══════════════════════════════════════════════════════════════════════════════
# Nginx Reverse Proxy Configuration for NexusIDE
# ══════════════════════════════════════════════════════════════════════════════
# Place this file at /etc/nginx/conf.d/nexuside.conf or include in nginx.conf
# ══════════════════════════════════════════════════════════════════════════════

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/s;

# Upstream backend
upstream nexuside_backend {
    server web:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    include /etc/nginx/conf.d/nexuside_locations.conf;
}

