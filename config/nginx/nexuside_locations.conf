# ══════════════════════════════════════════════════════════════════════════════
# NexusIDE Location Blocks (included by nginx.conf)
# ══════════════════════════════════════════════════════════════════════════════

# ── Security Headers ──
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# CSP - Django middleware handles this dynamically; nginx adds a baseline
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# ── Gzip Compression ──
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

# ── Static Files (served directly by Nginx) ──
location /static/ {
    alias /app/staticfiles/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

location /media/ {
    alias /app/media/;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

# ── Favicon & Manifest ──
location /favicon.ico {
    alias /app/static/dist/favicon.ico;
    access_log off;
    log_not_found off;
}

location /favicon.svg {
    alias /app/static/dist/favicon.svg;
    access_log off;
    log_not_found off;
}

location /site.webmanifest {
    alias /app/static/dist/site.webmanifest;
    access_log off;
    log_not_found off;
}

# ── API Endpoints (rate limited) ──
location /api/ {
    limit_req zone=api_limit burst=50 nodelay;
    limit_req_status 429;

    proxy_pass http://nexuside_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_http_version 1.1;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
}

# ── Auth Endpoints (stricter rate limit) ──
location /api/auth/ {
    limit_req zone=auth_limit burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://nexuside_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
}

# ── AI Endpoints (moderate rate limit) ──
location /api/ai/ {
    limit_req zone=ai_limit burst=20 nodelay;
    limit_req_status 429;

    proxy_pass http://nexuside_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_http_version 1.1;

    # SSE streaming support
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    chunked_transfer_encoding off;
}

# ── WebSocket Connections ──
location /ws/ {
    proxy_pass http://nexuside_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket timeouts
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# ── Admin Panel ──
location /admin/ {
    proxy_pass http://nexuside_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
}

# ── Metrics (internal only) ──
location /metrics/ {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    proxy_pass http://nexuside_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# ── Health Check ──
location /api/health/ {
    proxy_pass http://nexuside_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    access_log off;
}

# ── Default (React SPA) ──
location / {
    proxy_pass http://nexuside_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_http_version 1.1;

    # Cache static assets from React build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /app/static/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ── Block Suspicious Requests ──
location ~* \.(env|git|svn|htaccess|htpasswd|ini|log|bak|sql)$ {
    deny all;
    return 404;
}

location ~* ^/(wp-admin|wp-login|xmlrpc\.php) {
    deny all;
    return 404;
}

# ── Custom Error Pages ──
error_page 429 /429.json;
location = /429.json {
    internal;
    default_type application/json;
    return 429 '{"error": "Rate limit exceeded. Please slow down."}';
}

error_page 502 /502.json;
location = /502.json {
    internal;
    default_type application/json;
    return 502 '{"error": "Service temporarily unavailable. Please try again."}';
}
